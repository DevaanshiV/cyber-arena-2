<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CyberArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-300: #93c5fd;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-800: #1e40af;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--white);
            color: var(--slate-800);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
        }

        .signup-wrapper {
            width: 100%;
            max-width: 440px;
            animation: fadeSlideUp 0.5s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--slate-900);
            letter-spacing: -0.02em;
        }

        .card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(0, 0, 0, 0.03);
            padding: 40px 36px;
            border: 1px solid var(--slate-100);
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(37, 99, 235, 0.1);
        }

        .card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--slate-900);
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            text-align: center;
        }

        .card .subtitle {
            text-align: center;
            color: var(--slate-500);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--slate-700);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--radius-md);
            outline: none;
            transition: all 0.2s ease;
            background: var(--white);
            color: var(--slate-800);
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input:focus {
            border-color: var(--blue-500);
            box-shadow: var(--shadow-glow);
        }

        .input-wrapper input::placeholder {
            color: var(--slate-400);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--slate-400);
            font-size: 1.1rem;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            color: var(--slate-600);
        }

        .btn-create {
            width: 100%;
            padding: 13px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            background: var(--blue-600);
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-create:hover {
            background: var(--blue-700);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }

        .btn-create:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(37, 99, 235, 0.35);
        }

        .btn-create.loading {
            pointer-events: none;
            color: transparent;
        }

        .btn-create.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .signin-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
            color: var(--slate-500);
        }

        .signin-link a {
            color: var(--blue-600);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signin-link a:hover {
            color: var(--blue-700);
            text-decoration: underline;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .error-message.visible {
            display: flex;
        }

        @media (max-width: 500px) {
            .card {
                padding: 32px 24px;
            }
            .card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="signup-wrapper">
        <!-- Logo -->
        <a href="index.html" class="logo">
            <div class="logo-icon">&#128737;</div>
            <span class="logo-text">CyberArena</span>
        </a>

        <!-- Card -->
        <div class="card">
            <h1>Create your account</h1>
            <p class="subtitle">Start your cybersecurity journey today</p>

            <form id="signupForm" novalidate>
                <!-- Full Name -->
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required autocomplete="name">
                    </div>
                    <div class="error-message" id="nameError">
                        <span>&#9888;</span> Please enter your full name.
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="error-message" id="emailError">
                        <span>&#9888;</span> Please enter a valid email address.
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            &#128065;
                        </button>
                    </div>
                    <div class="error-message" id="passwordError">
                        <span>&#9888;</span> Password must be at least 6 characters.
                    </div>
                </div>

                <!-- Create Account Button -->
                <button type="submit" class="btn-create" id="createBtn">Create Account</button>
            </form>

            <!-- Sign In Link -->
            <div class="signin-link">
                Already have an account? <a href="signin.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('signupForm');
            const fullNameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const createBtn = document.getElementById('createBtn');
            const togglePasswordBtn = document.getElementById('togglePassword');

            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            // ---------- Toggle password visibility ----------
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.innerHTML = type === 'password' ? '&#128065;' : '&#128064;';
            });

            // ---------- Hide errors on input ----------
            fullNameInput.addEventListener('input', () => nameError.classList.remove('visible'));
            emailInput.addEventListener('input', () => emailError.classList.remove('visible'));
            passwordInput.addEventListener('input', () => passwordError.classList.remove('visible'));

            // ---------- Form submission ----------
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                let isValid = true;

                const fullName = fullNameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Full name validation
                if (!fullName) {
                    nameError.classList.add('visible');
                    isValid = false;
                } else {
                    nameError.classList.remove('visible');
                }

                // Email validation
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    emailError.classList.add('visible');
                    isValid = false;
                } else {
                    emailError.classList.remove('visible');
                }

                // Password validation (minimum 6 characters)
                if (!password || password.length < 6) {
                    passwordError.classList.add('visible');
                    isValid = false;
                } else {
                    passwordError.classList.remove('visible');
                }

                if (!isValid) return;

                // ---------- Store username in localStorage ----------
                // Using the full name as the username for display purposes
                localStorage.setItem('cyberarena_username', fullName);
                // Optionally store email for later auto-fill
                localStorage.setItem('cyberarena_email', email);

                // Loading state
                createBtn.classList.add('loading');
                createBtn.textContent = 'Creating account...';

                // Redirect after a brief simulated delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            });

            // Allow Enter key to submit
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        })();
    </script>
</body>
</html>
